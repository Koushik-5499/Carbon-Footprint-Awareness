<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - EcoTrack</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script src="js/main.js"></script>
    <script>
        checkAuth();
        renderAuthNav();
    </script>

    <div class="container">
        <h2 class="text-center mb-2">Global Leaderboard</h2>
        
        <div class="glass-panel" style="max-width: 800px; margin: 0 auto;">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="border-bottom: 2px solid rgba(0,0,0,0.1);">
                        <th style="padding: 1rem; text-align: left;">Rank</th>
                        <th style="padding: 1rem; text-align: left;">Eco Warrior</th>
                        <th style="padding: 1rem; text-align: right;">Sustainability Score</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <!-- Rows will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/leaderboard.js"></script>
</body>
</html>
