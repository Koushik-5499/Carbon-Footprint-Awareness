<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Calculator - EcoTrack</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script src="js/main.js"></script>
    <script>
        checkAuth();
        renderAuthNav();
    </script>

    <div class="container">
        <h2 class="text-center mb-2">Calculate Your Footprint</h2>
        
        <div class="grid-2">
            <div class="glass-panel">
                <div id="calcAlert" class="alert hidden"></div>
                <form id="calculatorForm">
                    <div class="form-group">
                        <label><i class="fa-solid fa-car"></i> Transport (km driven/ridden today)</label>
                        <input type="number" id="transport" class="form-control" placeholder="e.g. 15" min="0" step="0.1">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fa-solid fa-bolt"></i> Electricity (kWh used today)</label>
                        <input type="number" id="electricity" class="form-control" placeholder="e.g. 5" min="0" step="0.1">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fa-solid fa-droplet"></i> Water (Liters used today)</label>
                        <input type="number" id="water" class="form-control" placeholder="e.g. 150" min="0" step="1">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fa-solid fa-fire-burner"></i> LPG/Gas (kg used today)</label>
                        <input type="number" id="gas" class="form-control" placeholder="e.g. 0.5" min="0" step="0.1">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fa-solid fa-trash"></i> Waste Generated (kg today)</label>
                        <input type="number" id="waste" class="form-control" placeholder="e.g. 1" min="0" step="0.1">
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Calculate & Save</button>
                </form>
            </div>
            
            <div class="glass-panel text-center" style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <h3>Your Latest Input Result</h3>
                <h1 id="resultTotal" style="font-size: 4rem; color: var(--primary-green); margin: 2rem 0;">--</h1>
                <p>kg CO₂e</p>
                <div id="scoreUpdate" class="mt-2" style="font-weight: bold; color: var(--accent-color); font-size: 1.2rem;"></div>
                <a href="dashboard.html" class="btn btn-secondary mt-2">View Dashboard Dashboard</a>
            </div>
        </div>
    </div>

    <script src="js/calculator.js"></script>
</body>
</html>
