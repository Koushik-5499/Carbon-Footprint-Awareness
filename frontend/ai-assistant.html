<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ask the EcoTrack AI assistant questions about carbon footprints and receive personalized eco-recommendations.">
    <title>AI Assistant - EcoTrack</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <a href="#main" class="skip-link sr-only">Skip to main content</a>
    <script src="js/main.js"></script>
    <script>
        checkAuth();
        renderAuthNav();
    </script>

    <main id="main" role="main">
        <div class="container">
            <h2 class="text-center mb-2">AI Sustainability Assistant</h2>
        
        <div class="grid-2">
            <!-- Left Side: Recommendations & Tips -->
            <div class="glass-panel flex-col-start">
                <h3>Personalized Recommendations</h3>
                <div id="recommendationsContainer" class="lh-1-6">
                    Loading your personalized eco-recommendations...
                </div>
            </div>

            <!-- Right Side: Chat Interface -->
            <div class="glass-panel chat-box">
                <h3>Ask a Question</h3>
                <div id="chatMessages" class="chat-messages-container">
                    <div class="margin-bottom-1r">
                        <strong>EcoBot:</strong> Hi! I'm your sustainability assistant. Ask me anything about reducing emissions, saving water, or carbon footprint calculations!
                    </div>
                </div>
                <form id="chatForm" class="chat-input-form" aria-label="Chat form">
                    <label for="chatInput" class="sr-only">Ask a question</label>
                    <input type="text" id="chatInput" class="form-control" placeholder="Ask a question..." required>
                    <button type="submit" class="btn btn-primary" aria-label="Send message"><i class="fa-solid fa-paper-plane" aria-hidden="true"></i></button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/ai-assistant.js"></script>
</body>
</html>
