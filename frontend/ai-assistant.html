<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - EcoTrack</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script src="js/main.js"></script>
    <script>
        checkAuth();
        renderAuthNav();
    </script>

    <div class="container">
        <h2 class="text-center mb-2">AI Sustainability Assistant</h2>
        
        <div class="grid-2">
            <!-- Left Side: Recommendations & Tips -->
            <div class="glass-panel" style="display: flex; flex-direction: column; justify-content: flex-start;">
                <h3>Personalized Recommendations</h3>
                <div id="recommendationsContainer" style="color: var(--text-secondary); line-height: 1.6; margin-top: 1rem;">
                    Loading your personalized eco-recommendations...
                </div>
            </div>

            <!-- Right Side: Chat Interface -->
            <div class="glass-panel" style="display: flex; flex-direction: column; height: 500px;">
                <h3>Ask a Question</h3>
                <div id="chatMessages" style="flex-grow: 1; overflow-y: auto; padding: 1rem; background: rgba(255,255,255,0.4); border-radius: 12px; margin-bottom: 1rem; border: 1px solid rgba(0,0,0,0.05);">
                    <div style="margin-bottom: 1rem;">
                        <strong>EcoBot:</strong> Hi! I'm your sustainability assistant. Ask me anything about reducing emissions, saving water, or carbon footprint calculations!
                    </div>
                </div>
                <form id="chatForm" style="display: flex; gap: 0.5rem;">
                    <input type="text" id="chatInput" class="form-control" placeholder="Ask a question..." required>
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/ai-assistant.js"></script>
</body>
</html>
