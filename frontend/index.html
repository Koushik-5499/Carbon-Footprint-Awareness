<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrack - Carbon Footprint Awareness</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo">
            <i class="fa-solid fa-leaf"></i> EcoTrack
        </div>
        <ul class="nav-links" id="guestNav">
            <li><a href="#about">About</a></li>
            <li><a href="#features">Features</a></li>
        </ul>
    </nav>

    <div class="container mt-3">
        <div class="grid-2 align-items-center">
            <div class="hero-text">
                <h1 style="font-size: 3rem; line-height: 1.2;">Track your impact, <br><span style="color: var(--primary-green);">heal the planet.</span></h1>
                <p class="mb-2" style="font-size: 1.2rem; color: var(--text-secondary);">EcoTrack helps you calculate, monitor, and reduce your carbon footprint through AI-powered insights and engaging challenges.</p>
                
                <div class="glass-panel" id="authPanel">
                    <div id="authAlert" class="alert hidden"></div>
                    
                    <!-- Login Form -->
                    <form id="loginForm">
                        <h2 class="text-center">Welcome Back</h2>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="loginEmail" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="loginPassword" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
                        <p class="text-center mt-1">
                            New here? <a href="#" id="showRegister">Create an account</a>
                        </p>
                    </form>

                    <!-- Register Form (Hidden by default) -->
                    <form id="registerForm" class="hidden">
                        <h2 class="text-center">Join EcoTrack</h2>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="regName" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="regEmail" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="regPassword" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
                        <p class="text-center mt-1">
                            Already have an account? <a href="#" id="showLogin">Sign In</a>
                        </p>
                    </form>
                </div>
            </div>
            
            <div class="hero-image text-center">
                <img src="assets/images/hero_eco_illustration.png" alt="Eco Friendly Illustration" style="max-width: 100%; border-radius: 20px; animation: float 3s ease-in-out infinite;">
            </div>
        </div>
    </div>

    <style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>

    <script src="js/main.js"></script>
    <script>
        // Redirect to dashboard if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }

        // Toggle Auth Forms
        document.getElementById('showRegister').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('authAlert').className = 'alert hidden';
        });

        document.getElementById('showLogin').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('authAlert').className = 'alert hidden';
        });

        // Login Logic
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const res = await apiCall('/api/auth/login', 'POST', { email, password });
                if(res.token) {
                    localStorage.setItem('token', res.token);
                    localStorage.setItem('user', JSON.stringify(res.user));
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                showAlert('authAlert', err.message, 'error');
            }
        });

        // Register Logic
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            try {
                const res = await apiCall('/api/auth/register', 'POST', { name, email, password });
                if(res.token) {
                    localStorage.setItem('token', res.token);
                    localStorage.setItem('user', JSON.stringify(res.user));
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                showAlert('authAlert', err.message, 'error');
            }
        });
    </script>
</body>
</html>
