<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - EcoTrack</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script src="js/main.js"></script>
    <script>
        checkAuth();
        renderAuthNav();
    </script>

    <div class="container">
        <h2 class="text-center mb-2">Admin Dashboard</h2>
        <div id="adminAlert" class="alert hidden"></div>

        <div class="grid-4 mb-2">
            <div class="glass-panel text-center">
                <h3 style="color: var(--text-secondary); font-size: 1rem;">Total Users</h3>
                <h2 id="statUsers" style="font-size: 2rem; color: var(--primary-green);">0</h2>
            </div>
            <div class="glass-panel text-center">
                <h3 style="color: var(--text-secondary); font-size: 1rem;">Total Emissions Logged</h3>
                <h2 id="statEmissions" style="font-size: 2rem; color: #E53E3E;">0 kg</h2>
            </div>
            <div class="glass-panel text-center">
                <h3 style="color: var(--text-secondary); font-size: 1rem;">Challenges Completed</h3>
                <h2 id="statCompleted" style="font-size: 2rem; color: var(--accent-color);">0</h2>
            </div>
            <div class="glass-panel text-center">
                <h3 style="color: var(--text-secondary); font-size: 1rem;">Available Challenges</h3>
                <h2 id="statChallenges" style="font-size: 2rem; color: var(--light-green);">0</h2>
            </div>
        </div>

        <div class="grid-2">
            <!-- User Activity -->
            <div class="glass-panel">
                <h3>User Activity Overview</h3>
                <table style="width: 100%; border-collapse: collapse;" id="usersTable">
                    <thead>
                        <tr style="border-bottom: 2px solid rgba(0,0,0,0.1);">
                            <th style="padding: 0.5rem; text-align: left;">Name</th>
                            <th style="padding: 0.5rem; text-align: left;">Email</th>
                            <th style="padding: 0.5rem; text-align: right;">Entries</th>
                            <th style="padding: 0.5rem; text-align: right;">Score</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rows will be injected here -->
                    </tbody>
                </table>
            </div>

            <!-- Manage Challenges -->
            <div class="glass-panel">
                <h3>Create New Challenge</h3>
                <form id="createChallengeForm">
                    <div class="form-group">
                        <label>Challenge Title</label>
                        <input type="text" id="challengeTitle" class="form-control" placeholder="e.g. Bring a Reusable Cup" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="challengeDesc" class="form-control" placeholder="e.g. Use a reusable bottle/cup today." required>
                    </div>
                    <div class="grid-2" style="gap: 1rem;">
                        <div class="form-group">
                            <label>Points</label>
                            <input type="number" id="challengePoints" class="form-control" placeholder="e.g. 50" required>
                        </div>
                        <div class="form-group">
                            <label>Type</label>
                            <select id="challengeType" class="form-control" required>
                                <option value="daily">Daily</option>
                                <option value="weekly">Weekly</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Create Challenge</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
