<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage the EcoTrack platform, view user statistics, and create new challenges.">
    <title>Admin - EcoTrack</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <a href="#main" class="skip-link sr-only">Skip to main content</a>
    <script src="js/main.js"></script>
    <script>
        checkAuth();
        renderAuthNav();
    </script>

    <main id="main" role="main">
        <div class="container">
            <h2 class="text-center mb-2">Admin Dashboard</h2>
            <div id="adminAlert" class="alert hidden" role="alert" aria-live="polite"></div>

        <div class="grid-4 mb-2">
            <div class="glass-panel text-center">
                <h3 class="text-secondary-sm">Total Users</h3>
                <h2 id="statUsers" class="font-2r text-primary-green">0</h2>
            </div>
            <div class="glass-panel text-center">
                <h3 class="text-secondary-sm">Total Emissions Logged</h3>
                <h2 id="statEmissions" class="font-2r color-red">0 kg</h2>
            </div>
            <div class="glass-panel text-center">
                <h3 class="text-secondary-sm">Challenges Completed</h3>
                <h2 id="statCompleted" class="font-2r color-accent">0</h2>
            </div>
            <div class="glass-panel text-center">
                <h3 class="text-secondary-sm">Available Challenges</h3>
                <h2 id="statChallenges" class="font-2r color-light-green">0</h2>
            </div>
        </div>

        <div class="grid-2">
            <!-- User Activity -->
            <div class="glass-panel">
                <h3>User Activity Overview</h3>
                <table class="border-collapse" id="usersTable">
                    <thead>
                        <tr class="table-header-border">
                            <th class="th-left">Name</th>
                            <th class="th-left">Email</th>
                            <th class="th-right">Entries</th>
                            <th class="th-right">Score</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rows will be injected here -->
                    </tbody>
                </table>
            </div>

            <!-- Manage Challenges -->
            <div class="glass-panel">
                <h3>Create New Challenge</h3>
                <form id="createChallengeForm">
                    <div class="form-group">
                        <label for="challengeTitle">Challenge Title</label>
                        <input type="text" id="challengeTitle" class="form-control" placeholder="e.g. Bring a Reusable Cup" required>
                    </div>
                    <div class="form-group">
                        <label for="challengeDesc">Description</label>
                        <input type="text" id="challengeDesc" class="form-control" placeholder="e.g. Use a reusable bottle/cup today." required>
                    </div>
                    <div class="grid-2 gap-1">
                        <div class="form-group">
                            <label for="challengePoints">Points</label>
                            <input type="number" id="challengePoints" class="form-control" placeholder="e.g. 50" required>
                        </div>
                        <div class="form-group">
                            <label for="challengeType">Type</label>
                            <select id="challengeType" class="form-control" required>
                                <option value="daily">Daily</option>
                                <option value="weekly">Weekly</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Create Challenge</button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/admin.js"></script>
</body>
</html>
